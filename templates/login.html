<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SLA Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
    <div class="card login-card p-4">
        <div class="card-body">
            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename='images/image.png') }}" alt="Cydea Tech Logo" style="height: 60px; width: auto; object-fit: contain;" class="mb-2"><br>
                <h4 class="mt-1 mb-0" style="font-weight:800; color:#1a2980; letter-spacing: -0.02em;">Cydea Tech</h4>
                <small class="text-muted" style="font-weight:600;">Automated SLA Tracking System</small>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="passwordInput" class="form-control" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePasswordBtn" style="border-color: var(--border-color);">
                            <i class="bi bi-eye" id="togglePasswordIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>

            <!--
            <hr>
            <p class="small text-muted mb-0">
                Demo accounts (after running <code>seed_data.py</code>):<br>
                admin / Admin123! &middot; manager / Manager123! &middot; viewer / Viewer123!
            </p>
            -->
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const toggleBtn = document.getElementById("togglePasswordBtn");
    const passwordInput = document.getElementById("passwordInput");
    const toggleIcon = document.getElementById("togglePasswordIcon");

    if (toggleBtn && passwordInput && toggleIcon) {
        toggleBtn.addEventListener("click", function() {
            const isPassword = passwordInput.type === "password";
            passwordInput.type = isPassword ? "text" : "password";
            toggleIcon.className = isPassword ? "bi bi-eye-slash" : "bi bi-eye";
        });
    }
});
</script>
</body>
</html>
